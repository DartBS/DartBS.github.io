<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dart Bot Panel</title>

    <style>
        body {
            background: linear-gradient(135deg, #111827, #1e3a8a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
        }

        h1 {
            color: white;
        }

        button {
            width: 220px;
            padding: 15px;
            margin: 10px;
            border-radius: 15px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .blue {
            background: rgba(0,120,255,0.35);
        }

        .green {
            background: rgba(0,255,100,0.25);
        }

        .purple {
            background: rgba(160,0,255,0.3);
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="panel">

<h1>🚀 Dart Bot</h1>

<button class="blue">
🔵 Mavi Buton
</button>

<br>

<button class="green">
🟢 Yeşil Buton
</button>

<br>

<button class="purple">
🟣 Mor Buton
</button>

</div>

</body>
</html>
